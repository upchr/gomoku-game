services:
  # 前端服务
  frontend:
    image: chrplus/gomoku-frontend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: frontend
    container_name: gomoku-frontend
    ports:
      - "3000:80"
#    depends_on:
#      - backend
    networks:
      - gomoku-network
    restart: unless-stopped

  # 后端服务
  backend:
    image: chrplus/gomoku-backend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: backend
    container_name: gomoku-backend
    ports:
      - "8080:8080"
#    environment:
#      - NODE_ENV=production
#      - PORT=8080
    networks:
      - gomoku-network
    restart: unless-stopped

networks:
  gomoku-network:
    driver: bridge
