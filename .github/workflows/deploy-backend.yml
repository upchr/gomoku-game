name: Deploy Backend to Railway
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  RAILWAY_SERVICE_ID: "${{ secrets.GOMOKU_RAILWAY_SERVICE_ID }}"
  RAILWAY_ENVIRONMENT_ID: "${{ secrets.GOMOKU_RAILWAY_ENVIRONMENT_ID }}"
  RAILWAY_TOKEN: "${{ secrets.RAILWAY_TOKEN }}"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Railway deployment
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ env.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceDeployV2(serviceId: \"${{ env.RAILWAY_SERVICE_ID }}\", environmentId: \"${{ env.RAILWAY_ENVIRONMENT_ID }}\", commitSha: \"${{ github.sha }}\") { id status } }"
            }' \
            https://backboard.railway.com/graphql/v2)
          
          echo "Response: $RESPONSE"
          
          DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.data.serviceInstanceDeployV2.id // empty')
          
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "❌ Failed to get deployment ID"
            echo "Full response: $RESPONSE"
            exit 1
          fi
          
          echo "Deployment ID: $DEPLOYMENT_ID"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Wait for deployment
        run: |
          DEPLOYMENT_ID=${{ env.DEPLOYMENT_ID }}
          
          for i in {1..120}; do
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer ${{ env.RAILWAY_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{
                "query": "query { deployment(id: \"'$DEPLOYMENT_ID'\") { status } }"
              }' \
              https://backboard.railway.com/graphql/v2)
          
            STATUS=$(echo "$RESPONSE" | jq -r '.data.deployment.status // empty')
          
            echo "[$i/120] Deployment status: $STATUS"
          
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "✅ Deployment succeeded!"
              exit 0
            elif [ "$STATUS" = "FAILED" ]; then
              echo "❌ Deployment failed!"
              echo "Response: $RESPONSE"
              exit 1
            fi
          
            sleep 5
          done
          
          echo "⏰ Deployment timeout after 10 minutes"
          exit 1
