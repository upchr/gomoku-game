name: Deploy Backend to Railway
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Railway deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.GOMOKU_RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.GOMOKU_RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_WORKSPACE_ID: ${{ secrets.RAILWAY_WORKSPACE_ID }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "x-railway-workspace-id: ${RAILWAY_WORKSPACE_ID}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeployV2(serviceId: \\\"${RAILWAY_SERVICE_ID}\\\", environmentId: \\\"${RAILWAY_ENVIRONMENT_ID}\\\", commitSha: \\\"${COMMIT_SHA}\\\") }\"}" \
            https://backboard.railway.com/graphql/v2)
          
          echo "Response: $RESPONSE"
          
          DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.data.serviceInstanceDeployV2 // empty')
          
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "❌ Failed to get deployment ID"
            exit 1
          fi
          
          echo "Deployment ID: $DEPLOYMENT_ID"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Wait for deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_WORKSPACE_ID: ${{ secrets.RAILWAY_WORKSPACE_ID }}
          DEPLOYMENT_ID: ${{ env.DEPLOYMENT_ID }}
        run: |
          for i in {1..120}; do
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
              -H "x-railway-workspace-id: ${RAILWAY_WORKSPACE_ID}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"query { deployment(id: \\\"${DEPLOYMENT_ID}\\\") { status } }\"}" \
              https://backboard.railway.com/graphql/v2)
          
            STATUS=$(echo "$RESPONSE" | jq -r '.data.deployment.status // empty')
          
            echo "[$i/120] Deployment status: $STATUS"
          
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "✅ Deployment succeeded!"
              exit 0
            elif [ "$STATUS" = "FAILED" ]; then
              echo "❌ Deployment failed!"
              exit 1
            fi
          
            sleep 5
          done
          
          echo "⏰ Deployment timeout"
          exit 1
