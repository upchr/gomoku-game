name: Deploy Backend to Railway

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  RAILWAY_SERVICE_ID: "${{ secrets.RAILWAY_SERVICE_ID }}"
  RAILWAY_ENVIRONMENT_ID: "${{ secrets.RAILWAY_ENVIRONMENT_ID }}"
  TAG: ${{ github.ref_name }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 步骤1：更新 Railway 服务的代码源
      - name: Update Railway service source
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceUpdate(serviceId: \"'${{ env.RAILWAY_SERVICE_ID }}'\", environmentId: \"'${{ env.RAILWAY_ENVIRONMENT_ID }}'\", input: {source: {repo: \"upchr/gomoku-game\"}}) }"}' \
            https://backboard.railway.com/graphql/v2

      # 步骤2：触发 Railway 部署
      - name: Trigger Railway deployment
        run: |
          DEPLOYMENT_ID=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceDeployV2(serviceId: \"'${{ env.RAILWAY_SERVICE_ID }}'\", environmentId: \"'${{ env.RAILWAY_ENVIRONMENT_ID }}'\", commitSha: \"${{ github.sha }}\") }"}' \
            https://backboard.railway.com/graphql/v2 | jq -r '.data.serviceInstanceDeployV2')
          
          echo "Deployment ID: $DEPLOYMENT_ID"
          echo "Commit SHA: ${{ github.sha }}"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Wait for deployment
        run: |
          for i in {1..60}; do
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"query":"query { deployment(id: \"'${DEPLOYMENT_ID}'\") { status } }"}' \
              https://backboard.railway.com/graphql/v2 | jq -r '.data.deployment.status')
            
            echo "Deployment status: $STATUS"
            
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "✅ Deployment succeeded!"
              exit 0
            elif [ "$STATUS" = "FAILED" ]; then
              echo "❌ Deployment failed!"
              exit 1
            fi
            
            sleep 10
          done
          
          echo "⏰ Deployment timeout"
          exit 1

      # ====== 飞书通知 ======
      - name: Send Feishu notification (success)
        if: success()
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d '{
              "msg_type": "interactive",
              "card": {
                "type":"template",
                "data": {
                  "template_id":"AAqKyUKd4t2t1",
                  "template_version_name":"1.1.1",
                  "template_variable": {
                    "status":"成功",
                    "status_color":"green",
                    "step":"Railway 后端部署",
                    "description":"五子棋后端部署成功\nTag: ${{ env.TAG }}",
                    "log_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              }
            }'

      - name: Send Feishu notification (failure)
        if: failure()
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d '{
              "msg_type": "interactive",
              "card": {
                "type":"template",
                "data": {
                  "template_id":"AAqKyUKd4t2t1",
                  "template_version_name":"1.1.1",
                  "template_variable": {
                    "status":"失败",
                    "status_color":"red",
                    "step":"Railway 后端部署",
                    "description":"五子棋后端部署失败\nTag: ${{ env.TAG }}",
                    "log_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              }
            }'
