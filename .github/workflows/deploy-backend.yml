name: Deploy Backend to Railway
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  RAILWAY_SERVICE_ID: "${{ secrets.GOMOKU_RAILWAY_SERVICE_ID }}"
  RAILWAY_ENVIRONMENT_ID: "${{ secrets.GOMOKU_RAILWAY_ENVIRONMENT_ID }}"
  RAILWAY_TOKEN: "${{ secrets.RAILWAY_TOKEN }}"
  TAG: ${{ github.ref_name }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Railway deployment
        run: |
          DEPLOYMENT_ID=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ env.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceDeployV2(serviceId: \"'${{ env.RAILWAY_SERVICE_ID }}'\", environmentId: \"'${{ env.RAILWAY_ENVIRONMENT_ID }}'\", commitSha: \"${{ github.sha }}\") { id } }"}' \
            https://backboard.railway.com/graphql/v2 | jq -r '.data.serviceInstanceDeployV2.id')
          
          echo "Deployment ID: $DEPLOYMENT_ID"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Wait for deployment
        run: |
          for i in {1..60}; do
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ env.RAILWAY_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"query":"query { deployment(id: \"'${DEPLOYMENT_ID}'\") { status } }"}' \
              https://backboard.railway.com/graphql/v2 | jq -r '.data.deployment.status')
          
            echo "Deployment status: $STATUS"
          
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "✅ Deployment succeeded!"
              exit 0
            elif [ "$STATUS" = "FAILED" ]; then
              echo "❌ Deployment failed!"
              exit 1
            fi
          
            sleep 10
          done
          
          echo "⏰ Deployment timeout"
          exit 1
