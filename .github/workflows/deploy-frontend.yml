name: Deploy Frontend to GitHub Pages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  TAG: ${{ github.ref_name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-frontend"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 直接部署静态文件到 GitHub Pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ====== 飞书通知 ======
      - name: Send Feishu notification (success)
        if: success()
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d '{
              "msg_type": "interactive",
              "card": {
                "type":"template",
                "data": {
                  "template_id":"AAqKyUKd4t2t1",
                  "template_version_name":"1.1.1",
                  "template_variable": {
                    "status":"成功",
                    "status_color":"green",
                    "step":"GitHub Pages 前端部署",
                    "description":"五子棋前端部署成功\nTag: ${{ env.TAG }}\nURL: ${{ steps.deployment.outputs.page_url }}",
                    "log_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              }
            }'

      - name: Send Feishu notification (failure)
        if: failure()
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d '{
              "msg_type": "interactive",
              "card": {
                "type":"template",
                "data": {
                  "template_id":"AAqKyUKd4t2t1",
                  "template_version_name":"1.1.1",
                  "template_variable": {
                    "status":"失败",
                    "status_color":"red",
                    "step":"GitHub Pages 前端部署",
                    "description":"五子棋前端部署失败\nTag: ${{ env.TAG }}",
                    "log_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              }
            }'
