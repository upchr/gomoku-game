<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - 对战平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #e74c3c;
            --light: #ecf0f1;
            --board: #d4a574;
            --board-line: #8b6914;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        header p {
            color: #aaa;
        }
        
        /* 主菜单 */
        .menu-screen {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            margin: 50px auto;
            backdrop-filter: blur(10px);
        }
        
        .menu-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .menu-btn.primary {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
        }
        
        .menu-btn.secondary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: #fff;
        }
        
        .menu-btn.tertiary {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #fff;
        }
        
        .menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        /* 游戏界面 */
        .game-screen {
            display: none;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .player-info {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            min-width: 150px;
        }
        
        .player-info.active {
            background: rgba(231, 76, 60, 0.3);
            border: 2px solid #e74c3c;
        }
        
        .player-info .name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .player-info .time {
            font-size: 24px;
            font-family: 'Courier New', monospace;
        }
        
        .player-info .pieces {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }
        
        .game-status {
            text-align: center;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        
        /* 棋盘 */
        .board-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        
        .board {
            background: var(--board);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            position: relative;
        }
        
        .board-grid {
            display: grid;
            gap: 0;
            position: relative;
        }
        
        .cell {
            width: 32px;
            height: 32px;
            position: relative;
            cursor: pointer;
        }
        
        .cell::before,
        .cell::after {
            content: '';
            position: absolute;
            background: var(--board-line);
        }
        
        .cell::before {
            width: 1px;
            height: 100%;
            left: 50%;
            top: 0;
        }
        
        .cell::after {
            width: 100%;
            height: 1px;
            left: 0;
            top: 50%;
        }
        
        .cell:first-child::before { top: 50%; height: 50%; }
        .cell:last-child::before { height: 50%; }
        
        .piece {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            transition: all 0.2s;
        }
        
        .piece.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        
        .piece.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        
        .piece.last-move::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #e74c3c;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .cell:hover::before {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(0,0,0,0.2);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        
        .cell.has-piece:hover::before {
            display: none;
        }
        
        /* 星位点 */
        .star-point::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--board-line);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #3498db;
            color: #fff;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        
        .btn-success {
            background: #2ecc71;
            color: #fff;
        }
        
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        /* 设置面板 */
        .settings-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .settings-content {
            background: #2c3e50;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
        }
        
        .settings-content h2 {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #34495e;
            border-radius: 8px;
            background: #34495e;
            color: #fff;
            font-size: 16px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            border-color: #3498db;
            outline: none;
        }
        
        /* 对局记录 */
        .history-panel {
            display: none;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .history-item .info {
            flex: 1;
        }
        
        .history-item .winner {
            font-weight: 600;
            color: #2ecc71;
        }
        
        .history-item .date {
            font-size: 12px;
            color: #888;
        }
        
        /* 在线房间 */
        .room-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .room-content {
            background: #2c3e50;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
        }
        
        .room-info {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
        
        .room-code {
            font-size: 32px;
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
            color: #2ecc71;
        }
        
        .qr-hint {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
        
        .waiting-dots {
            display: inline-block;
        }
        
        .waiting-dots span {
            animation: blink 1.4s infinite;
            animation-fill-mode: both;
        }
        
        .waiting-dots span:nth-child(2) { animation-delay: 0.2s; }
        .waiting-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
        
        /* 胜利弹窗 */
        .win-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .win-content {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .win-content h2 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .win-content .winner-name {
            color: #2ecc71;
            font-size: 28px;
            margin-bottom: 30px;
        }
        
        /* 聊天/消息 */
        .chat-panel {
            display: none;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .chat-message {
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .chat-message .sender {
            color: #3498db;
            font-weight: 600;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .cell {
                width: 24px;
                height: 24px;
            }
            
            .piece {
                width: 20px;
                height: 20px;
            }
            
            header h1 {
                font-size: 1.8em;
            }
            
            .menu-screen {
                padding: 25px;
            }
            
            .player-info {
                padding: 10px 15px;
                min-width: 120px;
            }
            
            .player-info .time {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚫ 五子棋 ⚪</h1>
            <p>本地对战 · 在线对战 · 对局记录</p>
        </header>
        
        <!-- 主菜单 -->
        <div class="menu-screen" id="menuScreen">
            <button class="menu-btn primary" onclick="showLocalSetup()">
                🎮 本地对战
            </button>
            <button class="menu-btn secondary" onclick="showOnlineSetup()">
                🌐 在线对战
            </button>
            <button class="menu-btn tertiary" onclick="showHistory()">
                📋 对局记录
            </button>
        </div>
        
        <!-- 游戏界面 -->
        <div class="game-screen" id="gameScreen">
            <div class="game-header">
                <div class="player-info" id="player1Info">
                    <div class="name">⚫ <span id="player1Name">黑方</span></div>
                    <div class="time" id="player1Time">05:00</div>
                    <div class="pieces">落子: <span id="player1Moves">0</span></div>
                </div>
                
                <div class="game-status">
                    <div id="gameStatus">黑方先行</div>
                </div>
                
                <div class="player-info" id="player2Info">
                    <div class="name">⚪ <span id="player2Name">白方</span></div>
                    <div class="time" id="player2Time">05:00</div>
                    <div class="pieces">落子: <span id="player2Moves">0</span></div>
                </div>
            </div>
            
            <div class="board-container">
                <div class="board">
                    <div class="board-grid" id="board"></div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn btn-danger" onclick="surrender()">认输</button>
                <button class="btn btn-primary" onclick="undoMove()">悔棋</button>
                <button class="btn btn-success" onclick="restartGame()">重新开始</button>
                <button class="btn btn-primary" onclick="backToMenu()">返回菜单</button>
            </div>
            
            <!-- 在线对战聊天 -->
            <div class="chat-panel" id="chatPanel">
                <div id="chatMessages"></div>
            </div>
        </div>
        
        <!-- 对局记录 -->
        <div class="history-panel" id="historyPanel">
            <h3 style="margin-bottom: 15px;">📋 对局记录</h3>
            <div id="historyList"></div>
        </div>
    </div>
    
    <!-- 本地对战设置 -->
    <div class="settings-panel" id="localSetupPanel">
        <div class="settings-content">
            <h2>🎮 本地对战设置</h2>
            
            <div class="form-group">
                <label>黑方名称</label>
                <input type="text" id="localPlayer1" placeholder="玩家1" maxlength="10">
            </div>
            
            <div class="form-group">
                <label>白方名称</label>
                <input type="text" id="localPlayer2" placeholder="玩家2" maxlength="10">
            </div>
            
            <div class="form-group">
                <label>对局时长</label>
                <select id="gameTime">
                    <option value="0">不限时</option>
                    <option value="180">3分钟</option>
                    <option value="300" selected>5分钟</option>
                    <option value="600">10分钟</option>
                    <option value="900">15分钟</option>
                    <option value="1800">30分钟</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>棋盘大小</label>
                <select id="boardSize">
                    <option value="13">13×13</option>
                    <option value="15" selected>15×15</option>
                    <option value="19">19×19</option>
                </select>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" style="flex:1" onclick="startLocalGame()">开始游戏</button>
                <button class="btn btn-danger" onclick="closePanel('localSetupPanel')">取消</button>
            </div>
        </div>
    </div>
    
    <!-- 在线对战设置 -->
    <div class="room-panel" id="onlineSetupPanel">
        <div class="room-content">
            <h2>🌐 在线对战</h2>
            
            <div class="form-group">
                <label>你的昵称</label>
                <input type="text" id="onlineNickname" placeholder="输入昵称" maxlength="10">
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn btn-primary" style="flex:1" onclick="createRoom()">创建房间</button>
                <button class="btn btn-success" style="flex:1" onclick="showJoinRoom()">加入房间</button>
            </div>
            
            <div id="joinRoomForm" style="display: none;">
                <div class="form-group">
                    <label>房间码</label>
                    <input type="text" id="roomCodeInput" placeholder="输入6位房间码" maxlength="6" style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <label>房间密码（如有）</label>
                    <input type="password" id="roomPasswordInput" placeholder="可选">
                </div>
                <button class="btn btn-success" style="width:100%" onclick="joinRoom()">加入</button>
            </div>
            
            <button class="btn btn-danger" style="width:100%; margin-top: 15px;" onclick="closePanel('onlineSetupPanel')">取消</button>
        </div>
    </div>
    
    <!-- 房间等待 -->
    <div class="room-panel" id="waitingPanel">
        <div class="room-content">
            <h2>⏳ 等待对手加入</h2>
            
            <div class="room-info">
                <div>房间码</div>
                <div class="room-code" id="displayRoomCode">ABC123</div>
                <div class="qr-hint">分享房间码给好友，或复制链接：</div>
                <div style="margin-top: 10px;">
                    <input type="text" id="roomLink" readonly style="width: 100%; padding: 8px; border-radius: 5px; border: none;">
                </div>
                <button class="btn btn-primary" style="margin-top: 10px;" onclick="copyRoomLink()">复制链接</button>
            </div>
            
            <p style="text-align: center; color: #aaa;">
                等待对手加入<span class="waiting-dots"><span>.</span><span>.</span><span>.</span></span>
            </p>
            
            <button class="btn btn-danger" style="width:100%; margin-top: 20px;" onclick="cancelWaiting()">取消</button>
        </div>
    </div>
    
    <!-- 胜利弹窗 -->
    <div class="win-modal" id="winModal">
        <div class="win-content">
            <h2>🎉 游戏结束</h2>
            <div class="winner-name" id="winnerName">黑方 获胜!</div>
            <div style="margin-bottom: 20px; color: #aaa;">
                用时: <span id="totalTime">0</span> 秒 | 
                总步数: <span id="totalMoves">0</span> 步
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="restartGame()">再来一局</button>
                <button class="btn btn-danger" onclick="backToMenu()">返回菜单</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 游戏状态 ====================
        const GameState = {
            board: [],              // 棋盘状态
            boardSize: 15,          // 棋盘大小
            currentPlayer: 1,       // 当前玩家 1=黑 2=白
            players: {
                1: { name: '黑方', time: 300, moves: 0 },
                2: { name: '白方', time: 300, moves: 0 }
            },
            gameTime: 300,          // 每人时间
            gameMode: 'local',      // local | online
            isPlaying: false,
            timer: null,
            startTime: null,
            moveHistory: [],        // 落子历史
            gameHistory: [],        // 对局记录
            room: null,             // 在线房间信息
            isMyTurn: true,         // 在线模式：是否轮到我
            myColor: 1              // 在线模式：我的颜色
        };
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadGameHistory();
            
            // 检查URL参数（在线对战加入）
            const params = new URLSearchParams(window.location.search);
            const room = params.get('room');
            if (room) {
                document.getElementById('roomCodeInput').value = room;
                showOnlineSetup();
                showJoinRoom();
            }
        });
        
        // ==================== 界面控制 ====================
        function showPanel(panelId) {
            document.getElementById(panelId).style.display = 'flex';
        }
        
        function closePanel(panelId) {
            document.getElementById(panelId).style.display = 'none';
        }
        
        function showLocalSetup() {
            showPanel('localSetupPanel');
        }
        
        function showOnlineSetup() {
            showPanel('onlineSetupPanel');
        }
        
        function showJoinRoom() {
            document.getElementById('joinRoomForm').style.display = 'block';
        }
        
        function showHistory() {
            const panel = document.getElementById('historyPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            renderHistory();
        }
        
        function backToMenu() {
            stopTimer();
            GameState.isPlaying = false;
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('menuScreen').style.display = 'block';
            document.getElementById('winModal').style.display = 'none';
            document.getElementById('chatPanel').style.display = 'none';
        }
        
        // ==================== 本地对战 ====================
        function startLocalGame() {
            const player1 = document.getElementById('localPlayer1').value || '玩家1';
            const player2 = document.getElementById('localPlayer2').value || '玩家2';
            const time = parseInt(document.getElementById('gameTime').value);
            const size = parseInt(document.getElementById('boardSize').value);
            
            initGame('local', {
                player1, player2, time, size
            });
            
            closePanel('localSetupPanel');
        }
        
        // ==================== 在线对战 ====================
        function generateRoomCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars[Math.floor(Math.random() * chars.length)];
            }
            return code;
        }
        
        function createRoom() {
            const nickname = document.getElementById('onlineNickname').value || '玩家';
            const roomCode = generateRoomCode();
            
            GameState.room = {
                code: roomCode,
                password: '',
                host: nickname,
                hostColor: 1,
                guest: null,
                status: 'waiting'
            };
            
            // 保存到 localStorage（模拟服务器）
            const rooms = JSON.parse(localStorage.getItem('gomoku_rooms') || '{}');
            rooms[roomCode] = {
                ...GameState.room,
                createdAt: Date.now()
            };
            localStorage.setItem('gomoku_rooms', JSON.stringify(rooms));
            
            // 显示等待面板
            document.getElementById('displayRoomCode').textContent = roomCode;
            const link = window.location.origin + window.location.pathname + '?room=' + roomCode;
            document.getElementById('roomLink').value = link;
            
            closePanel('onlineSetupPanel');
            showPanel('waitingPanel');
            
            // 开始轮询检查对手
            startPolling(roomCode);
        }
        
        function joinRoom() {
            const nickname = document.getElementById('onlineNickname').value || '玩家';
            const roomCode = document.getElementById('roomCodeInput').value.toUpperCase();
            const password = document.getElementById('roomPasswordInput').value;
            
            if (roomCode.length !== 6) {
                alert('请输入6位房间码');
                return;
            }
            
            const rooms = JSON.parse(localStorage.getItem('gomoku_rooms') || '{}');
            const room = rooms[roomCode];
            
            if (!room) {
                alert('房间不存在');
                return;
            }
            
            if (room.guest) {
                alert('房间已满');
                return;
            }
            
            // 加入房间
            room.guest = nickname;
            room.status = 'playing';
            localStorage.setItem('gomoku_rooms', JSON.stringify(rooms));
            
            GameState.room = room;
            GameState.myColor = 2; // 加入者是白方
            
            closePanel('onlineSetupPanel');
            initGame('online', {
                player1: room.host,
                player2: nickname,
                time: 300,
                size: 15
            });
        }
        
        function startPolling(roomCode) {
            const pollInterval = setInterval(() => {
                const rooms = JSON.parse(localStorage.getItem('gomoku_rooms') || '{}');
                const room = rooms[roomCode];
                
                if (room && room.guest) {
                    clearInterval(pollInterval);
                    stopPolling();
                    
                    GameState.myColor = 1; // 创建者是黑方
                    closePanel('waitingPanel');
                    initGame('online', {
                        player1: room.host,
                        player2: room.guest,
                        time: 300,
                        size: 15
                    });
                }
                
                // 房间超时（5分钟）
                if (room && Date.now() - room.createdAt > 5 * 60 * 1000) {
                    clearInterval(pollInterval);
                    delete rooms[roomCode];
                    localStorage.setItem('gomoku_rooms', JSON.stringify(rooms));
                    alert('等待超时，房间已关闭');
                    cancelWaiting();
                }
            }, 1000);
            
            GameState.pollInterval = pollInterval;
        }
        
        function stopPolling() {
            if (GameState.pollInterval) {
                clearInterval(GameState.pollInterval);
                GameState.pollInterval = null;
            }
        }
        
        function cancelWaiting() {
            stopPolling();
            
            if (GameState.room) {
                const rooms = JSON.parse(localStorage.getItem('gomoku_rooms') || '{}');
                delete rooms[GameState.room.code];
                localStorage.setItem('gomoku_rooms', JSON.stringify(rooms));
            }
            
            closePanel('waitingPanel');
        }
        
        function copyRoomLink() {
            const link = document.getElementById('roomLink');
            link.select();
            document.execCommand('copy');
            alert('链接已复制！');
        }
        
        // ==================== 游戏核心 ====================
        function initGame(mode, config) {
            GameState.gameMode = mode;
            GameState.boardSize = config.size;
            GameState.gameTime = config.time;
            GameState.currentPlayer = 1;
            GameState.isPlaying = true;
            GameState.moveHistory = [];
            GameState.startTime = Date.now();
            
            GameState.players[1] = {
                name: config.player1,
                time: config.time,
                moves: 0
            };
            GameState.players[2] = {
                name: config.player2,
                time: config.time,
                moves: 0
            };
            
            // 初始化棋盘
            GameState.board = [];
            for (let i = 0; i < config.size; i++) {
                GameState.board[i] = [];
                for (let j = 0; j < config.size; j++) {
                    GameState.board[i][j] = 0;
                }
            }
            
            // 显示游戏界面
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            
            // 更新玩家信息
            document.getElementById('player1Name').textContent = GameState.players[1].name;
            document.getElementById('player2Name').textContent = GameState.players[2].name;
            
            // 渲染棋盘
            renderBoard();
            updateUI();
            
            // 启动计时器
            if (config.time > 0) {
                startTimer();
            }
            
            // 在线模式显示聊天
            if (mode === 'online') {
                document.getElementById('chatPanel').style.display = 'block';
                GameState.isMyTurn = GameState.myColor === 1;
                
                // 开始同步游戏状态
                startGameSync();
            }
        }
        
        function renderBoard() {
            const board = document.getElementById('board');
            const size = GameState.boardSize;
            
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${size}, 32px)`;
            
            // 星位点位置
            const starPoints = size === 15 ? 
                [[3,3], [3,7], [3,11], [7,3], [7,7], [7,11], [11,3], [11,7], [11,11]] :
                size === 19 ?
                [[3,3], [3,9], [3,15], [9,3], [9,9], [9,15], [15,3], [15,9], [15,15]] :
                [[3,3], [3,6], [3,9], [6,3], [6,6], [6,9], [9,3], [9,6], [9,9]];
            
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    // 添加星位点
                    if (starPoints.some(p => p[0] === i && p[1] === j)) {
                        cell.classList.add('star-point');
                    }
                    
                    cell.addEventListener('click', () => placePiece(i, j));
                    board.appendChild(cell);
                }
            }
        }
        
        function placePiece(row, col) {
            if (!GameState.isPlaying) return;
            if (GameState.board[row][col] !== 0) return;
            
            // 在线模式检查是否轮到我
            if (GameState.gameMode === 'online' && !GameState.isMyTurn) {
                return;
            }
            
            // 落子
            GameState.board[row][col] = GameState.currentPlayer;
            GameState.players[GameState.currentPlayer].moves++;
            GameState.moveHistory.push({ row, col, player: GameState.currentPlayer });
            
            // 更新棋盘显示
            updateCell(row, col);
            
            // 检查胜负
            if (checkWin(row, col)) {
                endGame(GameState.currentPlayer);
                return;
            }
            
            // 检查平局
            if (GameState.moveHistory.length === GameState.boardSize * GameState.boardSize) {
                endGame(0); // 平局
                return;
            }
            
            // 切换玩家
            GameState.currentPlayer = GameState.currentPlayer === 1 ? 2 : 1;
            
            // 在线模式更新状态
            if (GameState.gameMode === 'online') {
                GameState.isMyTurn = !GameState.isMyTurn;
                syncGameState();
            }
            
            updateUI();
        }
        
        function updateCell(row, col) {
            const cell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
            
            // 移除之前的最后一手标记
            document.querySelectorAll('.piece.last-move').forEach(p => {
                p.classList.remove('last-move');
            });
            
            // 添加棋子
            const piece = document.createElement('div');
            piece.className = `piece ${GameState.board[row][col] === 1 ? 'black' : 'white'} last-move`;
            cell.appendChild(piece);
            cell.classList.add('has-piece');
        }
        
        function checkWin(row, col) {
            const player = GameState.board[row][col];
            const directions = [
                [[0, 1], [0, -1]],   // 横向
                [[1, 0], [-1, 0]],   // 纵向
                [[1, 1], [-1, -1]], // 对角线
                [[1, -1], [-1, 1]]  // 反对角线
            ];
            
            for (const dir of directions) {
                let count = 1;
                
                for (const [dr, dc] of dir) {
                    let r = row + dr;
                    let c = col + dc;
                    
                    while (
                        r >= 0 && r < GameState.boardSize &&
                        c >= 0 && c < GameState.boardSize &&
                        GameState.board[r][c] === player
                    ) {
                        count++;
                        r += dr;
                        c += dc;
                    }
                }
                
                if (count >= 5) return true;
            }
            
            return false;
        }
        
        function endGame(winner) {
            GameState.isPlaying = false;
            stopTimer();
            
            const modal = document.getElementById('winModal');
            const winnerName = document.getElementById('winnerName');
            
            if (winner === 0) {
                winnerName.textContent = '平局!';
                winnerName.style.color = '#f39c12';
            } else {
                winnerName.textContent = `${GameState.players[winner].name} 获胜!`;
                winnerName.style.color = '#2ecc71';
            }
            
            const elapsed = Math.floor((Date.now() - GameState.startTime) / 1000);
            document.getElementById('totalTime').textContent = elapsed;
            document.getElementById('totalMoves').textContent = GameState.moveHistory.length;
            
            // 保存对局记录
            saveGameHistory(winner);
            
            modal.style.display = 'flex';
        }
        
        function updateUI() {
            // 更新当前玩家高亮
            document.getElementById('player1Info').classList.toggle('active', GameState.currentPlayer === 1);
            document.getElementById('player2Info').classList.toggle('active', GameState.currentPlayer === 2);
            
            // 更新落子数
            document.getElementById('player1Moves').textContent = GameState.players[1].moves;
            document.getElementById('player2Moves').textContent = GameState.players[2].moves;
            
            // 更新状态文字
            const status = document.getElementById('gameStatus');
            if (GameState.gameMode === 'online') {
                status.textContent = GameState.isMyTurn ? '轮到你了' : '等待对手...';
            } else {
                status.textContent = `${GameState.players[GameState.currentPlayer].name} 落子`;
            }
        }
        
        // ==================== 计时器 ====================
        function startTimer() {
            if (GameState.timer) clearInterval(GameState.timer);
            
            GameState.timer = setInterval(() => {
                if (!GameState.isPlaying) return;
                
                GameState.players[GameState.currentPlayer].time--;
                updateTimerDisplay();
                
                if (GameState.players[GameState.currentPlayer].time <= 0) {
                    // 超时判负
                    const winner = GameState.currentPlayer === 1 ? 2 : 1;
                    endGame(winner);
                }
            }, 1000);
        }
        
        function stopTimer() {
            if (GameState.timer) {
                clearInterval(GameState.timer);
                GameState.timer = null;
            }
        }
        
        function updateTimerDisplay() {
            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };
            
            document.getElementById('player1Time').textContent = formatTime(GameState.players[1].time);
            document.getElementById('player2Time').textContent = formatTime(GameState.players[2].time);
            
            // 时间紧张提示
            document.getElementById('player1Time').style.color = GameState.players[1].time < 30 ? '#e74c3c' : '#fff';
            document.getElementById('player2Time').style.color = GameState.players[2].time < 30 ? '#e74c3c' : '#fff';
        }
        
        // ==================== 游戏操作 ====================
        function undoMove() {
            if (GameState.moveHistory.length === 0) return;
            if (GameState.gameMode === 'online') {
                alert('在线对战不支持悔棋');
                return;
            }
            
            const lastMove = GameState.moveHistory.pop();
            GameState.board[lastMove.row][lastMove.col] = 0;
            GameState.players[lastMove.player].moves--;
            GameState.currentPlayer = lastMove.player;
            
            // 更新显示
            const cell = document.querySelector(`.cell[data-row="${lastMove.row}"][data-col="${lastMove.col}"]`);
            cell.innerHTML = '';
            cell.classList.remove('has-piece');
            
            // 更新最后一手标记
            if (GameState.moveHistory.length > 0) {
                const prevMove = GameState.moveHistory[GameState.moveHistory.length - 1];
                const prevCell = document.querySelector(`.cell[data-row="${prevMove.row}"][data-col="${prevMove.col}"]`);
                const piece = prevCell.querySelector('.piece');
                if (piece) piece.classList.add('last-move');
            }
            
            updateUI();
        }
        
        function surrender() {
            if (!GameState.isPlaying) return;
            if (!confirm('确定要认输吗？')) return;
            
            const winner = GameState.currentPlayer === 1 ? 2 : 1;
            endGame(winner);
        }
        
        function restartGame() {
            document.getElementById('winModal').style.display = 'none';
            
            initGame(GameState.gameMode, {
                player1: GameState.players[1].name,
                player2: GameState.players[2].name,
                time: GameState.gameTime,
                size: GameState.boardSize
            });
        }
        
        // ==================== 对局记录 ====================
        function saveGameHistory(winner) {
            const history = JSON.parse(localStorage.getItem('gomoku_history') || '[]');
            
            history.unshift({
                date: new Date().toLocaleString(),
                player1: GameState.players[1].name,
                player2: GameState.players[2].name,
                winner: winner === 0 ? '平局' : GameState.players[winner].name,
                moves: GameState.moveHistory.length,
                mode: GameState.gameMode
            });
            
            // 只保留最近50条
            if (history.length > 50) history.pop();
            
            localStorage.setItem('gomoku_history', JSON.stringify(history));
        }
        
        function loadGameHistory() {
            GameState.gameHistory = JSON.parse(localStorage.getItem('gomoku_history') || '[]');
        }
        
        function renderHistory() {
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('gomoku_history') || '[]');
            
            if (history.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #888;">暂无对局记录</p>';
                return;
            }
            
            list.innerHTML = history.map(game => `
                <div class="history-item">
                    <div class="info">
                        <div>${game.player1} vs ${game.player2}</div>
                        <div class="date">${game.date}</div>
                    </div>
                    <div>
                        <div class="winner">${game.winner} ${game.winner !== '平局' ? '胜' : ''}</div>
                        <div style="font-size: 12px; color: #888;">${game.moves} 步</div>
                    </div>
                </div>
            `).join('');
        }
        
        // ==================== 在线同步 ====================
        function startGameSync() {
            // 使用 BroadcastChannel 在同一浏览器的不同标签页之间同步
            if (typeof BroadcastChannel !== 'undefined') {
                GameState.channel = new BroadcastChannel(`gomoku_${GameState.room?.code || 'local'}`);
                
                GameState.channel.onmessage = (event) => {
                    const data = event.data;
                    
                    if (data.type === 'move') {
                        // 收到对手的落子
                        if (GameState.board[data.row][data.col] === 0) {
                            GameState.board[data.row][data.col] = data.player;
                            GameState.players[data.player].moves++;
                            GameState.moveHistory.push({ row: data.row, col: data.col, player: data.player });
                            updateCell(data.row, data.col);
                            
                            if (checkWin(data.row, data.col)) {
                                endGame(data.player);
                                return;
                            }
                            
                            GameState.currentPlayer = GameState.currentPlayer === 1 ? 2 : 1;
                            GameState.isMyTurn = !GameState.isMyTurn;
                            updateUI();
                        }
                    }
                };
            }
        }
        
        function syncGameState() {
            if (GameState.channel) {
                const lastMove = GameState.moveHistory[GameState.moveHistory.length - 1];
                GameState.channel.postMessage({
                    type: 'move',
                    row: lastMove.row,
                    col: lastMove.col,
                    player: lastMove.player
                });
            }
        }
    </script>
